name: 🔄 每日世界杯数据更新

on:
  schedule:
    # 每天 UTC 12:00（北京时间 20:00）运行
    - cron: '0 12 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 搜索最新动态
        run: |
          echo "=== 2026-05-26 数据更新 ==="
          echo "--- 搜索最新新闻 ---"
          curl -s "https://news.google.com/rss/search?q=2026+World+Cup+squad+injury+latest&hl=en-US&gl=US" | head -100 || echo "新闻抓取完成"

      - name: 🏗️ 验证文件完整性
        run: |
          echo "=== 检查文件 ==="
          FILES=(
            "2026-world-cup/index.html"
            "2026-world-cup/球队信息/全部48队名单与教练.md"
            "2026-world-cup/球队信息/小组赛完整赛程.md"
            "2026-world-cup/深度分析/夺冠热门深度分析.md"
            "2026-world-cup/深度分析/淘汰赛阶段分析.md"
          )
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "✅ $f ($(wc -c < $f) bytes)"
            else
              echo "⚠️ $f 不存在"
            fi
          done

      - name: 📤 提交更新
        run: |
          git config user.name "WC2026 Auto Update"
          git config user.email "bot@wc2026.example.com"
          git add -A
          # 只有真正有修改时才提交
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "📊 每日数据更新 $(date +'%Y-%m-%d')"
            git push
            echo "✅ 已提交更新"
          else
            echo "ℹ️ 无变更，跳过提交"
          fi
