name: 🔄 每日世界杯数据更新

on:
  schedule:
    # 每天 UTC 12:00（北京时间 20:00）
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 抓取最新数据并更新HTML
        run: bash auto-update.sh

      - name: 📤 提交并推送更新
        run: |
          git config user.name "WC2026 Bot"
          git config user.email "bot@wc2026.local"
          git add -A
          if ! git diff --quiet --cached; then
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "📊 数据更新 ${TIMESTAMP}"
            git push
            echo "✅ 已推送更新"
          else
            echo "ℹ️ 无变更，跳过提交"
          fi

      - name: ✅ 验证
        run: |
          echo "index.html: $(wc -c < index.html) bytes"
          echo "docs/index.html: $(wc -c < docs/index.html) bytes"
